<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Azure Hebrew Stemmen Test</title>
<script src="https://aka.ms/csspeech/jsbrowserpackageraw"></script>
<style>
body{font-family:sans-serif;padding:16px;background:#f0f4f3;max-width:500px;margin:0 auto}
h2{color:#1a7a6e}
h3{color:#888;font-size:11px;margin:14px 0 6px;text-transform:uppercase;letter-spacing:1px}
.stem{background:white;border-radius:12px;padding:12px;margin:6px 0;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.sn{font-weight:700;font-size:15px;margin-bottom:8px}
button{background:#1a7a6e;color:white;border:none;border-radius:8px;padding:9px 12px;font-size:13px;cursor:pointer;display:block;width:100%;margin:4px 0;text-align:left}
button.stop{background:#c0392b;margin:10px 0}
#status{font-size:13px;color:#444;margin:8px 0;padding:10px;background:white;border-radius:8px;min-height:20px}
</style>
</head>
<body>
<h2>Azure Hebrew Stemmen Test</h2>
<div id="status">Initialiseren...</div>
<button class="stop" onclick="stopAudio()">&#9632; Stop</button>

<h3>Mannelijk — Avri</h3>
<div class="stem">
<div class="sn">Avri &#9794;</div>
<button onclick="spreek('he-IL-AvriNeural',1)">&#128266; שָׁלוֹם, מַה שְׁלוֹמְךָ — Shalom, hoe gaat het?</button>
<button onclick="spreek('he-IL-AvriNeural',2)">&#128266; אֲנִי רוֹצֶה לִלְמֹד עִבְרִית — Ik wil Ivriet leren</button>
<button onclick="spreek('he-IL-AvriNeural',3)">&#128266; יוֹם טוֹב, אֵיךְ קוֹרְאִים לְךָ — Goedendag, hoe heet jij?</button>
<button onclick="spreek('he-IL-AvriNeural',4)">&#128266; תּוֹדָה רַבָּה, לְהִתְרָאוֹת — Dank je wel, tot ziens</button>
</div>

<h3>Vrouwelijk — Hila</h3>
<div class="stem">
<div class="sn">Hila &#9792;</div>
<button onclick="spreek('he-IL-HilaNeural',1)">&#128266; שָׁלוֹם, מַה שְׁלוֹמְךָ — Shalom, hoe gaat het?</button>
<button onclick="spreek('he-IL-HilaNeural',2)">&#128266; אֲנִי רוֹצָה לִלְמֹד עִבְרִית — Ik wil Ivriet leren</button>
<button onclick="spreek('he-IL-HilaNeural',3)">&#128266; יוֹם טוֹב, אֵיךְ קוֹרְאִים לָךְ — Goedendag, hoe heet jij?</button>
<button onclick="spreek('he-IL-HilaNeural',4)">&#128266; תּוֹדָה רַבָּה, לְהִתְרָאוֹת — Dank je wel, tot ziens</button>
</div>

<script>
var KEY = '3DsquDdr8PFmrJHfpxveCPsv5Ma0P1eCm4m3TID0IzhJpfboKYa7JQQJ99CDACYeBjFXJ3w3AAAYACOGLydm';
var REGION = 'eastus';
var synth = null;

var ZINNEN = {
  1: '\u05E9\u05B8\u05DC\u05D5\u05B9\u05DD, \u05DE\u05B7\u05D4 \u05E9\u05B0\u05DC\u05D5\u05B9\u05DE\u05B0\u05DA\u05BE',
  2: '\u05D0\u05B2\u05E0\u05B4\u05D9 \u05E8\u05D5\u05B9\u05E6\u05B6\u05D4 \u05DC\u05B4\u05DC\u05DE\u05B9\u05D3 \u05E2\u05B4\u05D1\u05E8\u05B4\u05D9\u05EA',
  3: '\u05D9\u05D5\u05B9\u05DD \u05D8\u05D5\u05B9\u05D1, \u05D0\u05B5\u05D9\u05DA \u05E7\u05D5\u05B9\u05E8\u05D0\u05B4\u05D9\u05DD \u05DC\u05B0\u05DA\u05BE',
  4: '\u05EA\u05BC\u05D5\u05B9\u05D3\u05B8\u05D4 \u05E8\u05B7\u05D1\u05B8\u05BC\u05D4, \u05DC\u05B0\u05D4\u05B4\u05EA\u05E8\u05D0\u05D5\u05B9\u05EA'
};

function initSynth(voice) {
  var config = SpeechSDK.SpeechConfig.fromSubscription(KEY, REGION);
  config.speechSynthesisVoiceName = voice;
  return SpeechSDK.SpeechSynthesizer.FromConfig(config, null);
}

function spreek(voice, zin) {
  stopAudio();
  var st = document.getElementById('status');
  st.textContent = 'Laden...';
  try {
    synth = initSynth(voice);
    synth.speakTextAsync(
      ZINNEN[zin],
      function(result) {
        if (result.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted) {
          st.textContent = 'Klaar: ' + voice;
        } else {
          st.textContent = 'Fout: ' + result.errorDetails;
        }
        synth.close();
        synth = null;
      },
      function(err) {
        st.textContent = 'Fout: ' + err;
        synth.close();
        synth = null;
      }
    );
    st.textContent = 'Speelt: ' + voice;
  } catch(e) {
    st.textContent = 'Fout: ' + e.message;
  }
}

function stopAudio() {
  if (synth) { try { synth.close(); synth = null; } catch(e) {} }
  document.getElementById('status').textContent = 'Gestopt';
}

document.getElementById('status').textContent = 'Klaar - kies een stem';
</script>
</body>
</html>
